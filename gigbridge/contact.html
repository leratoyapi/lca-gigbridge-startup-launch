<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigBridge| Register Interest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Gig<span>Bridge
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="services.html" class="nav-link">Marketplace</a></li>
                <li><a href="contact.html" class="nav-link active">Join Us</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="max-width: 600px;">
        <h1>Register Your Interest</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Are you a startup client looking to hire, or a talent wishing to register? Fill out the structure below.</p>
        
<form id="registrationForm" class="contact-form" 
      action="https://formspree.io/f/mvznepdb" method="POST" novalidate>
  
  <div class="form-group">
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Enter your name" required>
    <div class="error-message" id="nameError">Name field must contain at least 3 characters.</div>
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" class="form-control" placeholder="example@domain.co.za" required>
    <div class="error-message" id="emailError">Please input a valid email address structure.</div>
  </div>

  <div class="form-group">
    <label for="roleType">I am...</label>
    <select id="roleType" name="roleType" class="form-control" required>
      <option value="">Select your role</option>
      <option value="student">Student</option>
      <option value="graduate">Recent Graduate (0-3yrs)</option>
      <option value="professional">Young Professional</option>
      <option value="client">Client/Employer</option>
    </select>
  </div>

  <div class="form-group">
    <label for="skills">Top Skills</label>
    <input type="text" id="skills" name="skills" class="form-control" placeholder="e.g. React, Figma, Copywriting">
  </div>

  <div class="form-group">
    <label for="optional">Anything else? (optional)</label>
    <input type="text" id="optional" name="optional" class="form-control" placeholder="Tell us about yourself or the type of work you're looking for...">
  </div>

  <button type="submit" class="btn btn-neon" style="width: 100%;">Submit Application</button>
</form>
        <div id="formFeedback" style="margin-top: 1.5rem; font-weight: bold; text-align: center;"></div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
